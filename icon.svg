<svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Sfondo Premium Dark -->
  <rect width="512" height="512" rx="112" fill="#030712"/>

  <!-- Anello Estetico di Contorno -->
  <circle cx="256" cy="256" r="225" stroke="#f59e0b" stroke-width="4" stroke-dasharray="16 20" fill="none" opacity="0.15"/>

  <!-- Autostrada prospettica estesa e profonda (Base Larga, Orizzonte Alto) -->
  <path d="M190 170 L322 170 L430 460 L82 460 Z" fill="#090f1a" stroke="#f59e0b" stroke-width="6" stroke-linejoin="round"/>
  <path d="M256 460 L256 170" stroke="#f59e0b" stroke-width="8" stroke-dasharray="18 18" stroke-linecap="round" opacity="0.7"/>

  <!-- Piatto Gourmet d'Alta Cucina all'orizzonte -->
  <g transform="translate(256, 110) scale(0.9)">
    <circle cx="0" cy="0" r="55" fill="#030712" stroke="#ffffff" stroke-width="8"/>
    <circle cx="0" cy="0" r="42" fill="none" stroke="#ffffff" stroke-width="2" stroke-dasharray="6 8" opacity="0.25"/>
    <!-- Forchetta Elegante -->
    <g transform="translate(-16, -20) scale(0.75)">
      <path d="M -2 5 L -2 30 C -2 35 2 35 2 30 L 2 5 Z" fill="#f59e0b"/>
      <path d="M -8 -5 C -8 5 8 5 8 -5 Z" fill="#f59e0b"/>
      <path d="M -8 -5 V -28 M -3 -5 V -30 M 3 -5 V -30 M 8 -5 V -28" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
    </g>
    <!-- Coltello Sinuoso -->
    <g transform="translate(16, -20) scale(0.75)">
      <path d="M -1 8 L -1 32 C -1 35 3 35 3 32 L 3 8 Z" fill="#f59e0b"/>
      <path d="M 3 8 L 8 -28 C 4 -30 -4 -20 -4 5 C -4 8 3 8 3 8 Z" fill="#f59e0b" stroke="#f59e0b" stroke-width="1" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Lumaca Ufficiale Slow Food (Silhouette Organica Perfetta da image_f0bdfb.png) -->
  <g transform="translate(220, 325) scale(1.1)">
    <!-- Corpo Unificato: Guscio Circolare + Collo Slanciato + Antenne Sdoppiate -->
    <!-- Disegnato con curve armoniche continue per un look professionale ed elegante -->
    <path d="M -45 25 
             C -55 25, -52 35, -40 35 
             C -10 37, 20 37, 45 33 
             C 55 31, 62 20, 58 2
             C 56 -5, 66 -12, 75 -15 
             C 80 -17, 82 -12, 76 -7
             C 68 2, 54 24, 42 31
             C 32 36, -5 34, -20 30 Z" 
          fill="#f59e0b" />
          
    <!-- Antenna Posteriore (Tipica del logo Slow Food, staccata dal collo dietro) -->
    <path d="M 46 -1 C 44 -12, 48 -22, 54 -27 C 57 -29, 59 -26, 56 -21 C 52 -14, 49 -6, 48 1 Z" fill="#f59e0b"/>

    <!-- Il Guscio Principale (Perfettamente Rotondo a Sinistra) -->
    <circle cx="-10" cy="-5" r="42" fill="#f59e0b"/>

    <!-- Linea di Taglio/Separazione tra Guscio e Collo (Esattamente come l'originale) -->
    <path d="M 14 24 C 26 12, 26 -12, 14 -28" stroke="#030712" stroke-width="5" stroke-linecap="round" fill="none"/>

    <!-- La Spirale Interna Continua (Spessore e curve calibrate sul logo originale) -->
    <path d="M -10 -5
             A 6 6 0 0 1 -4 -5
             A 13 13 0 0 0 -17 -5
             A 20 20 0 0 1 3 -5
             A 27 27 0 0 0 -24 -5
             A 34 34 0 0 1 10 -5
             C 11 -15, 6 -24, -2 -29"
          stroke="#030312" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
