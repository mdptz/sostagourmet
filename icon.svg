<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Sfondo scuro arrotondato (Perfetto per l'installazione su smartphone) -->
  <rect width="512" height="512" rx="110" fill="#030712" />
  
  <!-- Cerchio esterno ambra/oro (Volante / Piatto) -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="#f59e0b" stroke-width="20" stroke-linecap="round" stroke-dasharray="10 15" opacity="0.3" />
  <circle cx="256" cy="256" r="170" fill="none" stroke="#f59e0b" stroke-width="8" />

  <!-- Sagoma dell'Automobile in basso -->
  <path d="M170 330 L170 300 C170 270, 200 260, 256 260 C312 260, 342 270, 342 300 L342 330 Z" fill="#f59e0b" />
  <rect x="190" y="330" width="132" height="15" rx="5" fill="#f59e0b" />
  <!-- Ruote dell'auto -->
  <circle cx="200" cy="345" r="18" fill="#030712" stroke="#f59e0b" stroke-width="6" />
  <circle cx="312" cy="345" r="18" fill="#030712" stroke="#f59e0b" stroke-width="6" />
  <!-- Parabrezza -->
  <path d="M190 295 L210 273 C215 268, 230 267, 256 267 C282 267, 297 268, 302 273 L322 295 Z" fill="#030712" />

  <!-- Posate incrociate in alto (Forchetta e Coltello che indicano la meta gastronomica) -->
  <g transform="translate(256, 175) scale(0.9)">
    <!-- Coltello -->
    <path d="M-45 35 L-25 15 L-25 -40 C-25 -50, -35 -60, -45 -60 L-45 35 Z" fill="#f59e0b" />
    <rect x="-48" y="35" width="6" height="35" rx="3" fill="#f59e0b" />
    
    <!-- Forchetta -->
    <path d="M25 -10 L25 -60 L30 -60 L30 -30 L35 -30 L35 -60 L40 -60 L40 -30 L45 -30 L45 -60 L50 -60 L50 -10 C50 10, 25 10, 25 -10 Z" fill="#f59e0b" />
    <rect x="35" y="10" width="6" height="60" rx="3" fill="#f59e0b" />
  </g>
</svg>
