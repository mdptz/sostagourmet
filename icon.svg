<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Sfumatura Oro/Ambra Piena -->
    <linearGradient id="pinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="50%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
  </defs>

  <!-- Sfondo Dark Rounded -->
  <rect width="512" height="512" rx="112" fill="#0F172A"/>

  <!-- Sagoma Esterna Pin GPS PIENA -->
  <path d="M 256 60 C 150 60, 95 130, 95 225 C 95 330, 256 450, 256 450 C 256 450, 417 330, 417 225 C 417 130, 362 60, 256 60 Z" 
        fill="url(#pinGrad)"/>

  <!-- Strada Scura in Curva che sale dentro il Pin -->
  <path d="M 256 420 C 190 330, 310 290, 256 220" 
        fill="none" 
        stroke="#0F172A" 
        stroke-width="36" 
        stroke-linecap="round"/>

  <!-- Tratteggio Dorato di mezzeria della strada -->
  <path d="M 256 420 C 190 330, 310 290, 256 220" 
        fill="none" 
        stroke="#FBBF24" 
        stroke-width="6" 
        stroke-linecap="round" 
        stroke-dasharray="12 10"/>

  <!-- Cloche Scura in alto dentro il Pin -->
  <path d="M 186 210 C 186 140, 326 140, 326 210 Z" fill="#0F172A"/>
  <rect x="174" y="214" width="164" height="14" rx="7" fill="#0F172A"/>

  <!-- Pomello / Dettaglio Fogliolina della Cloche -->
  <circle cx="256" cy="132" r="10" fill="#0F172A"/>
  <path d="M 256 122 C 272 106, 286 112, 278 128" 
        fill="none" 
        stroke="#FFFFFF" 
        stroke-width="5" 
        stroke-linecap="round"/>
</svg>
